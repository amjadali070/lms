<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <defs>
    <!-- Premium Platinum Gradient for L and M -->
    <linearGradient id="platinum" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="50%" stop-color="#F8FAFC" />
      <stop offset="100%" stop-color="#CBD5E1" />
    </linearGradient>
    
    <!-- Premium Gold Gradient for S -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE047" />
      <stop offset="30%" stop-color="#EAB308" />
      <stop offset="70%" stop-color="#CA8A04" />
      <stop offset="100%" stop-color="#854D0E" />
    </linearGradient>
    
    <!-- Accent Line Gradient for the Underline -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#CA8A04" opacity="0.1" />
      <stop offset="50%" stop-color="#EAB308" opacity="1" />
      <stop offset="100%" stop-color="#CA8A04" opacity="0.1" />
    </linearGradient>

    <!-- Subtle Drop Shadow for 3D Depth/Pop -->
    <filter id="depth" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="1.5" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Group for centering and alignment -->
  <g transform="translate(15, 6)">
    <!-- L -->
    <text x="0" y="40" font-family="Montserrat, 'SF Pro Display', Inter, system-ui, sans-serif" font-weight="900" font-size="44" fill="url(#platinum)" filter="url(#depth)" letter-spacing="1">L</text>
    
    <!-- M -->
    <text x="36" y="40" font-family="Montserrat, 'SF Pro Display', Inter, system-ui, sans-serif" font-weight="900" font-size="44" fill="url(#platinum)" filter="url(#depth)" letter-spacing="1">M</text>
    
    <!-- S -->
    <text x="92" y="40" font-family="Montserrat, 'SF Pro Display', Inter, system-ui, sans-serif" font-weight="900" font-size="44" fill="url(#gold)" filter="url(#depth)" letter-spacing="1">S</text>

    <!-- Dynamic Accent Dot for modern styling -->
    <circle cx="132" cy="37" r="4" fill="url(#gold)" filter="url(#depth)" />

    <!-- Sleek Underline Accent to tie the logo together -->
    <rect x="0" y="48" width="136" height="2" rx="1" fill="url(#accent)" filter="url(#depth)" />
  </g>
</svg>
